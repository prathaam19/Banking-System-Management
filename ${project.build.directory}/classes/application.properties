spring.application.name=BankingApplication

# Database URL (replace banking_db with your actual schema name)
spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=YourUltraSecureSecretKeyForBankingAppThatIsVeryLongAndSecure2026
app.jwt.expiration=86400000

# Logging
logging.level.com.bank.BankingApplication=INFO

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true